<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CustomBuild — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #08080f;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(80,60,180,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(30,120,220,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 380px;
    padding: 44px 40px 40px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #7c6fff 0%, #4fc3f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo p {
    margin-top: 6px;
    font-size: 12px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: rgba(124,111,255,0.6);
    background: rgba(124,111,255,0.05);
  }

  .field input::placeholder { color: #444; }

  .btn {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    background: linear-gradient(135deg, #6c5ce7 0%, #4fc3f7 100%);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    margin-top: 16px;
    padding: 10px 14px;
    background: rgba(244,67,54,0.1);
    border: 1px solid rgba(244,67,54,0.3);
    border-radius: 8px;
    font-size: 13px;
    color: #ef9a9a;
    display: none;
  }

  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>CustomBuild</h1>
    <p>Command &amp; Control</p>
  </div>

  <div class="field">
    <label>Username</label>
    <input id="username" type="text" placeholder="Enter username" autocomplete="username" />
  </div>

  <div class="field">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
  </div>

  <button class="btn" id="loginBtn">LOGIN</button>
  <div class="error" id="error"></div>
</div>

<script>
  if (localStorage.getItem('token')) {
    window.location.href = '/dashboard.html';
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('show');
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
      showError('Username and password are required.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'LOGGING IN...';
    document.getElementById('error').classList.remove('show');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('token', data.data.token);
        localStorage.setItem('username', username);
        localStorage.setItem('admin', data.data.admin);
        window.location.href = '/dashboard.html';
      } else {
        showError(data.message || 'Login failed.');
        btn.disabled = false;
        btn.textContent = 'LOGIN';
      }
    } catch {
      showError('Could not reach server.');
      btn.disabled = false;
      btn.textContent = 'LOGIN';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
</script>
</body>
</html>
